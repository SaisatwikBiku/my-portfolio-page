<!DOCTYPE html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/fav-icon.png" type="image/png" />
    <meta name="theme-color" content="#0a0f1e" />
    <!-- Apply the saved theme before first paint to avoid a flash. Dark is the default. -->
    <script>
      try {
        document.documentElement.dataset.theme =
          localStorage.getItem('theme') === 'light' ? 'light' : 'dark'
      } catch (e) {
        /* localStorage unavailable — keep the dark default */
      }
    </script>
    <meta

      content="Sai Satwik Bikumandla — Software Engineer building full-stack systems across frontend, backend, and ML. MS Computer Science @ SUNY Albany."
